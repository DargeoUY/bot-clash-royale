services:
  bot:
    build: .
    env_file: .env
    depends_on:
      mariadb:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups

  mariadb:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: clashbot
      MARIADB_USER: ${DB_USER:-clashbot}
      MARIADB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
    ports:
      - '0.0.0.0:3307:3306'
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', "mysqladmin ping -h localhost -u root -p$$MARIADB_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mariadb_data:
