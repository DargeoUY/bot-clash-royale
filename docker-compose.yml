services:
  bot:
    build: .
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups

  mysql:
    image: mariadb:11
    environment:
      MYSQL_DATABASE: clashbot
      MYSQL_USER: ${DB_USER:-clashbot}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123}
    ports:
      - '127.0.0.1:3306:3306'
    volumes:
      - mysqldata:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h localhost --silent']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysqldata:
