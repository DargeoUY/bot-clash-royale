services:
  bot:
    build: .
    env_file: .env
    depends_on:
      mysql:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups

  mysql:
    image: mariadb:11
    environment:
      MYSQL_DATABASE: clashbot
      MYSQL_USER: ${DB_USER:-clashbot}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123}
    ports:
      - '0.0.0.0:3306:3306'
    volumes:
      - mysqldata:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysqldata:
