version: '3.8'

services:
  bot:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clashbot
      POSTGRES_USER: ${DB_USER:-clashbot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-clashbot}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
